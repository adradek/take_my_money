services:
  web:
    build:
      context: .
      args:
        UID: 1000
        GID: 1000
    ports:
      - 3333:3000
    volumes:
      - .:/usr/src/app
      - gem_cache:/usr/local/bundle
    env_file:
      - .envdir/development/database
      - .envdir/development/web
    depends_on:
      - database
    tty: true
    stdin_open: true

  database:
    image: postgres:12.2
    env_file:
      - .envdir/development/database
    volumes:
      - database:/var/lib/postgresql/data

volumes:
  gem_cache:
  database:
